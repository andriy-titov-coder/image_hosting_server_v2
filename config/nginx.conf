# """
# Цей конфігураційний файл налаштовує nginx як вхідну точку для застосунку.
# Він приймає HTTP-запити, напряму віддає статичні ресурси та завантажені файли,
# а всі інші запити пересилає на Python backend.
# """
events {
    worker_connections 1024;
}

http {
    # """
    # У блоці http задаються базові налаштування веб-сервера:
    # MIME-типи для коректної віддачі файлів, тип відповіді за замовчуванням
    # і внутрішній backend-сервіс, на який можна проксіювати запити.
    # """
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # """
    # Upstream app описує Python-сервіс, який обробляє динамічні маршрути.
    # Nginx використовує це ім'я як ціль для reverse proxy.
    # """
    upstream app {
        server app:8000;
    }

    server {
        # """
        # Це головний серверний блок.
        # Тут nginx слухає порт 8080, приймає HTTP-запити
        # і розподіляє їх між прямою віддачею файлів та backend-обробкою.
        # """
        listen 8080;
        client_max_body_size 100M;

        # """
        # Маршрут /images/ використовується для прямої віддачі
        # завантажених користувачем зображень із файлової системи.
        # """
        location /images/ {
            alias /images/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # """
        # Маршрут /static/ обслуговує статичні ресурси інтерфейсу:
        # стилі, скрипти та локальні зображення фронтенду.
        # """
        location /static/ {
            alias /app/src/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # """
        # Усі інші маршрути пересилаються до Python-застосунку
        # через reverse proxy разом з базовими HTTP-заголовками клієнта.
        # """
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
